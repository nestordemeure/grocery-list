<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#11191f">
    <title>Grocery List</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="header">
            <h1>Grocery List</h1>
            <button id="clearBtn" title="Clear Checked Items">🛒</button>
        </div>

        <form class="input-row" id="addItemForm">
            <input type="text" id="newItemInput" placeholder="Click to add new item..." enterkeyhint="go" />
            <select id="groupSelect">
                <option value="">🏷️</option>
            </select>
            <button type="submit" style="display: none;"></button>
        </form>

        <div id="groceryList"></div>

        <div class="footer-note">
            Data stored locally in browser, may be lost on updates or cache clearing. v1.1
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
